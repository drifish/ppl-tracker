<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PPL Tracker"/>
  <meta name="theme-color" content="#f97316"/>
  <title>PPL Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#111;color:#f1f1f1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
    button{cursor:pointer;font-family:inherit;}
    input,textarea,select{font-family:inherit;outline:none;}
    .card{background:#1a1a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid #2a2a2a;}
    .inp{background:#222;border:1px solid #2a2a2a;border-radius:7px;padding:8px;font-size:14px;color:#f1f1f1;width:100%;}
    .btn{border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;}
    .btn-accent{background:#2a1500;color:#f97316;}
    .btn-success{background:#0a1f0a;color:#22c55e;}
    .btn-danger{background:#2a0a0a;color:#ef4444;}
    .tab-bar{display:flex;border-bottom:1px solid #2a2a2a;background:#1a1a1a;position:sticky;top:0;z-index:10;}
    .tab{flex:1;padding:10px 2px;border:none;background:none;cursor:pointer;font-weight:700;font-size:9px;color:#444;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:-1px;}
    .tab.active{color:#f97316;border-bottom:2px solid #f97316;}
    .tab-icon{font-size:14px;}
    .badge{background:#2a1500;color:#f97316;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}
    .progress-bar{background:#2a2a2a;border-radius:99px;height:7px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;transition:width 0.3s;}
    .session-type{color:white;border-radius:8px;padding:5px 12px;font-weight:700;font-size:15px;}
    .timer-overlay{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #f97316;border-radius:16px;padding:16px 20px;box-shadow:0 0 24px #f9731655;z-index:100;min-width:240px;text-align:center;}
    #page{padding:16px;}
    .hidden{display:none!important;}
    .exo-row{display:grid;grid-template-columns:26px 1fr 1fr 24px;gap:4px;margin-bottom:4px;align-items:center;}
    .set-header{display:grid;grid-template-columns:26px 1fr 1fr 24px;gap:4px;font-size:11px;color:#444;margin-bottom:4px;}
  </style>
</head>
<body>

<!-- TAB BAR -->

<div class="tab-bar" id="tabBar">
  <button class="tab active" onclick="showTab('home')" id="tab-home"><span class="tab-icon">🏠</span><span>Séances</span></button>
  <button class="tab" onclick="showTab('prog')" id="tab-prog"><span class="tab-icon">📅</span><span>Programme</span></button>
  <button class="tab" onclick="showTab('pr')" id="tab-pr"><span class="tab-icon">🏆</span><span>Records</span></button>
  <button class="tab" onclick="showTab('nutri')" id="tab-nutri"><span class="tab-icon">🥗</span><span>Nutrition</span></button>
  <button class="tab" onclick="showTab('data')" id="tab-data"><span class="tab-icon">💾</span><span>Données</span></button>
  <button class="tab" onclick="showTab('supps')" id="tab-supps"><span class="tab-icon">💊</span><span>Compléments</span></button>
</div>

<div id="page"></div>

<!-- REST TIMER OVERLAY -->

<div class="timer-overlay hidden" id="restTimer">
  <div style="font-size:11px;color:#f97316;font-weight:700;letter-spacing:0.1em;margin-bottom:6px;">⏱ REPOS</div>
  <div id="timerDisplay" style="font-size:38px;font-weight:800;font-family:monospace;color:#f1f1f1;"></div>
  <div class="progress-bar" style="margin:10px 0;"><div class="progress-fill" id="timerBar" style="background:#f97316;width:0%"></div></div>
  <div style="display:flex;gap:8px;justify-content:center;">
    <button class="btn btn-accent" onclick="toggleTimer()">Pause</button>
    <button class="btn btn-accent" onclick="resetTimer()">↺</button>
    <button class="btn btn-danger" onclick="closeTimer()">✕</button>
  </div>
  <div id="timerDone" style="margin-top:8px;color:#22c55e;font-weight:700;display:none;">✓ C'est parti !</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────
const T={accent:"#f97316",accentDim:"#2a1500",success:"#22c55e",successDim:"#0a1f0a",danger:"#ef4444",dangerDim:"#2a0a0a",blue:"#3b82f6",blueDim:"#0a1428",purple:"#a855f7",purpleDim:"#1a0a28",water:"#38bdf8",waterDim:"#0a1e2a",text:"#f1f1f1",textSub:"#888",textMuted:"#444",card:"#1a1a1a",border:"#2a2a2a"};
const DAY_FULL=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const SCHEDULE={1:"Push A",2:"Pull",3:"run",4:"Push B",5:"Hybrid"};
const REST_TIMES={"Push A":120,"Push B":75,"Pull":90,"Hybrid":60};
const WATER_L=3.2, GLASSES=Math.ceil(WATER_L*1000/250);
const MACRO={cal:2300,protein:160,carbs:230,fat:70};
const SESSIONS={
  "Push A":{color:T.accent,bg:T.accentDim,step:2.5,label:"Force",desc:"4×6-8 · Charges lourdes · Repos 2-3 min",exos:[
    {n:"Développé couché / Chest Press",s:4,r:"6-8",w:57,note:"Compound principal — pecs, épaules, triceps"},
    {n:"Overhead Press / Shoulder Press",s:4,r:"6-8",w:46,note:"Compound épaules"},
    {n:"Vertical Chest Press",s:3,r:"6-8",w:55,note:"Compound secondaire — milieu pecs"},
    {n:"Dips lestés",s:3,r:"6-8",w:null,note:"Compound finisher — pecs bas + triceps"},
    {n:"Triceps barre (skull crusher)",s:3,r:"8",w:25,note:"Isolation triceps — en dernier"},
  ]},
  "Push B":{color:"#fb923c",bg:"#1e0e00",step:2.5,label:"Volume",desc:"4×12-15 · Charges modérées · Repos 60-90 s",exos:[
    {n:"Chest Press",s:4,r:"12-15",w:50,note:"Compound principal — pecs"},
    {n:"Vertical Chest Press",s:3,r:"12-15",w:46,note:"Compound secondaire"},
    {n:"Pec Fly",s:4,r:"15",w:54,note:"Isolation pecs"},
    {n:"Shoulder Press",s:3,r:"12-15",w:38,note:"Compound épaules"},
    {n:"Élévations latérales",s:4,r:"15",w:10,note:"Isolation deltoïdes"},
    {n:"Triceps Press",s:3,r:"15",w:50,note:"Isolation triceps"},
  ]},
  "Pull":{color:T.blue,bg:T.blueDim,step:2.5,label:"Dos & Biceps",desc:"4×10-12 · Progression sur poids",exos:[
    {n:"Lat Pulldown",s:4,r:"12",w:52,note:"Compound principal — grand dorsal"},
    {n:"Seated Row",s:4,r:"12",w:45,note:"Compound — dos en épaisseur"},
    {n:"High Row",s:3,r:"12",w:80,note:"Trapèzes + rhomboïdes"},
    {n:"Rear Delt (Pec Fly inversé)",s:3,r:"15",w:null,note:"Isolation deltoïdes postérieurs"},
    {n:"Curl biceps",s:3,r:"12",w:15,note:"Isolation biceps"},
    {n:"Curl marteau",s:3,r:"12",w:14,note:"Isolation brachial — finisher"},
  ]},
  "Hybrid":{color:T.purple,bg:T.purpleDim,step:2.5,label:"Abdos & Zones faibles",desc:"Core · Rotateurs · Mollets",exos:[
    {n:"Planche",s:3,r:"45s",w:null,note:"Gainage — transverse en premier"},
    {n:"Machine abdos",s:4,r:"15",w:40,note:"Fléchisseurs du tronc"},
    {n:"Crunch câble",s:3,r:"15",w:25,note:"Isolation abdominaux"},
    {n:"Face Pull (rotateurs)",s:4,r:"20",w:20,note:"Rotateurs coiffe"},
    {n:"Hip abducteur machine",s:3,r:"20",w:35,note:"Fessiers / abducteurs"},
    {n:"Élévations latérales allongé",s:3,r:"15",w:5,note:"Coiffe des rotateurs"},
    {n:"Mollets debout",s:4,r:"20",w:40,note:"Gastrocnémien"},
    {n:"Mollets assis",s:3,r:"20",w:30,note:"Soléaire"},
  ]},
};
const SUPPLEMENTS={
  "🌅 Matin":[{name:"Oméga-3",dose:"2 caps avec le petit-déj",icon:"🐟",color:T.water}],
  "⚡ Avant (~14h30)":[{name:"Whey",dose:"30g si repas léger",icon:"💪",color:T.purple}],
  "🏋️ Post-workout":[{name:"Whey",dose:"30g dans les 30 min après",icon:"💪",color:T.purple},{name:"Créatine",dose:"5g — timing optimal",icon:"⚡",color:T.accent}],
  "🌙 Soir":[{name:"Oméga-3",dose:"2 caps si pas pris le matin",icon:"🐟",color:T.water}],
};
const FOODS=[
  {name:"Blanc de poulet 100g",cal:110,protein:23,carbs:0,fat:2},
  {name:"Riz cuit 100g",cal:130,protein:3,carbs:28,fat:0},
  {name:"Whey 30g",cal:120,protein:24,carbs:4,fat:2},
  {name:"Œuf entier",cal:70,protein:6,carbs:0,fat:5},
  {name:"Blanc d'œuf",cal:17,protein:4,carbs:0,fat:0},
  {name:"Flocons d'avoine 50g",cal:180,protein:6,carbs:32,fat:3},
  {name:"Banane",cal:90,protein:1,carbs:22,fat:0},
  {name:"Thon en boîte 100g",cal:100,protein:23,carbs:0,fat:1},
  {name:"Pain de mie (tranche)",cal:70,protein:2,carbs:13,fat:1},
  {name:"Fromage blanc 0% 100g",cal:50,protein:8,carbs:4,fat:0},
];

// ── STATE ─────────────────────────────────────────────────
let state={
  sessions:[],bests:{},kg:82,nutri:{},water:0,
  activeTab:"home",view:"home",
  session:{type:null,exos:[],t0:null,elapsed:0,running:false,wuDone:false,wuCals:"",note:"",restSecs:null,restDef:0},
  detailS:null,
};

function todayKey(){return new Date().toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,"0");}
function fmtDur(s){return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;}
function fmtDate(iso){return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"});}

// ── STORAGE ───────────────────────────────────────────────
function loadAll(){
  try{const r=localStorage.getItem("ppl-sessions");    if(r)state.sessions=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem("ppl-bests");       if(r)state.bests=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem("ppl-weight");      if(r){const v=parseFloat(r);if(!isNaN(v))state.kg=v;}}catch{}
  try{const r=localStorage.getItem("ppl-nutrition");   if(r)state.nutri=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem("ppl-water-"+todayKey());if(r){const v=parseInt(r);if(!isNaN(v))state.water=v;}}catch{}
}
function saveSessions(){localStorage.setItem("ppl-sessions",JSON.stringify(state.sessions));}
function saveBests()   {localStorage.setItem("ppl-bests",JSON.stringify(state.bests));}
function saveKg()      {localStorage.setItem("ppl-weight",String(state.kg));}
function saveNutri()   {localStorage.setItem("ppl-nutrition",JSON.stringify(state.nutri));}
function saveWater()   {localStorage.setItem("ppl-water-"+todayKey(),String(state.water));}

// ── SESSION TIMER ─────────────────────────────────────────
let sessionInterval=null;
function startSessionTimer(){
  if(sessionInterval)clearInterval(sessionInterval);
  sessionInterval=setInterval(()=>{
    if(!state.session.running)return;
    state.session.elapsed++;
    const el=document.getElementById("sessionElapsed");
    if(el)el.textContent=fmtDur(state.session.elapsed);
  },1000);
}

// ── REST TIMER ────────────────────────────────────────────
let restInterval=null,restRem=0,restTotal=0,restRunning=false;
function launchRestTimer(secs){
  restTotal=secs;restRem=secs;restRunning=true;
  document.getElementById("restTimer").classList.remove("hidden");
  document.getElementById("timerDone").style.display="none";
  updateRestDisplay();
  if(restInterval)clearInterval(restInterval);
  restInterval=setInterval(()=>{
    if(!restRunning)return;
    restRem--;
    updateRestDisplay();
    if(restRem<=0){clearInterval(restInterval);document.getElementById("timerDone").style.display="block";}
  },1000);
}
function updateRestDisplay(){
  const d=document.getElementById("timerDisplay");
  const b=document.getElementById("timerBar");
  if(d)d.textContent=fmtDur(restRem);
  if(b)b.style.width=`${((restTotal-restRem)/restTotal)*100}%`;
  if(d)d.style.color=restRem<=10?T.danger:T.text;
  if(b)b.style.background=restRem<=10?T.danger:T.accent;
  const pb=document.querySelector("#restTimer .progress-fill");
  if(pb)pb.style.background=restRem<=10?T.danger:T.accent;
}
function toggleTimer(){restRunning=!restRunning;document.querySelector(".timer-overlay button").textContent=restRunning?"Pause":"▶";}
function resetTimer(){restRem=restTotal;restRunning=true;updateRestDisplay();}
function closeTimer(){clearInterval(restInterval);document.getElementById("restTimer").classList.add("hidden");}

// ── BUILD EXOS ────────────────────────────────────────────
function buildExos(type){
  return SESSIONS[type].exos.map(ex=>{
    const w=state.bests[ex.n]?.weight??ex.w;
    return{name:ex.n,note:ex.note,sets:Array.from({length:ex.s},()=>({reps:String(ex.r),weight:w!=null?String(w):""}))};
  });
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const pg=document.getElementById("page");
  if(state.view==="session"){pg.innerHTML=renderSession();startSessionTimer();return;}
  if(state.view==="history"){pg.innerHTML=renderHistory();return;}
  if(state.view==="detail"){pg.innerHTML=renderDetail();return;}
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const activeTab=document.getElementById("tab-"+state.activeTab);
  if(activeTab)activeTab.classList.add("active");
  switch(state.activeTab){
    case"home":  pg.innerHTML=renderHome();break;
    case"prog":  pg.innerHTML=renderProg();break;
    case"pr":    pg.innerHTML=renderPR();break;
    case"nutri": pg.innerHTML=renderNutri();break;
    case"data":  pg.innerHTML=renderData();break;
    case"supps": pg.innerHTML=renderSupps();break;
  }
}

function showTab(t){state.activeTab=t;state.view="main";render();}

// ── HOME ──────────────────────────────────────────────────
function renderHome(){
  const dow=new Date().getDay();
  const todaySes=SCHEDULE[dow];
  const wL=(state.water*250/1000).toFixed(2);
  const pct=Math.min(100,(state.water/GLASSES)*100);
  let todayHTML="";
  if(todaySes&&todaySes!=="run"){
    const sc=SESSIONS[todaySes];
    todayHTML=`<div style="background:${sc.bg};border-radius:12px;padding:12px 14px;margin-bottom:14px;border-left:4px solid ${sc.color};display:flex;align-items:center;justify-content:space-between;">
      <div><div style="font-size:12px;color:${T.textSub};font-weight:600;">Aujourd'hui — ${DAY_FULL[dow]}</div>
      <div style="font-weight:700;font-size:16px;color:${sc.color};">${todaySes} · ${sc.label}</div></div>
      <button onclick="startSession('${todaySes}')" style="background:${sc.color};color:white;border:none;border-radius:10px;padding:9px 18px;font-weight:700;font-size:14px;">Go !</button>
    </div>`;
  } else if(todaySes==="run"){
    todayHTML=`<div style="background:${T.successDim};border-radius:12px;padding:12px 14px;margin-bottom:14px;border-left:4px solid ${T.success};">
      <div style="font-size:12px;color:${T.textSub};">Aujourd'hui — ${DAY_FULL[dow]}</div>
      <div style="font-weight:700;font-size:16px;color:${T.success};">🏃 Course à pied — Prép 10km</div>
    </div>`;
  } else {
    todayHTML=`<div style="background:#1a1a1a;border-radius:12px;padding:12px 14px;margin-bottom:14px;text-align:center;color:${T.textSub};border:1px solid #2a2a2a;">${dow===6?"🛌 Repos optimal — récupération complète":"🛌 Repos"}</div>`;
  }
  const sessionsHTML=["Push A","Push B","Pull","Hybrid"].map(type=>{
    const sc=SESSIONS[type];
    const last=state.sessions.find(s=>s.type===type);
    return `<div class="card" style="border-left:4px solid ${sc.color};">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-weight:700;font-size:16px;color:${sc.color};">${type}</span>
            <span style="background:${sc.bg};color:${sc.color};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;">${sc.label}</span>
          </div>
          <div style="font-size:11px;color:${T.textMuted};margin-top:2px;">${last?`Dernière : ${fmtDate(last.date)}`:"Pas encore"}</div>
        </div>
        <button onclick="startSession('${type}')" style="background:${sc.color};color:white;border:none;border-radius:10px;padding:8px 16px;font-weight:700;font-size:13px;">Go</button>
      </div>
    </div>`;
  }).join("");
  return `
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:11px;color:${T.textMuted};font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Poids actuel</div>
        <div style="font-size:28px;font-weight:800;color:${T.accent};">${state.kg.toFixed(1)} <span style="font-size:16px;font-weight:500;color:${T.textSub};">kg</span></div>
        <div style="font-size:12px;color:${T.success};">Objectif : 79 kg · Reste : ${Math.max(0,state.kg-79).toFixed(1)} kg</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button onclick="changeKg(0.1)" class="btn btn-success" style="font-size:18px;padding:6px 14px;">+</button>
        <button onclick="changeKg(-0.1)" class="btn btn-danger" style="font-size:18px;padding:6px 14px;">−</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div>
          <div style="font-size:11px;color:${T.textMuted};font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Hydratation</div>
          <div style="font-size:20px;font-weight:800;color:${T.water};">${wL} L <span style="font-size:13px;color:${T.textSub};">/ ${WATER_L} L</span></div>
          <div style="font-size:11px;color:${T.textSub};">${GLASSES} verres de 250 ml</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button onclick="changeWater(-1)" style="background:${T.waterDim};color:${T.water};border:none;border-radius:8px;padding:6px 12px;font-size:16px;font-weight:600;">−</button>
          <span id="waterCount" style="font-size:16px;font-weight:700;color:${T.water};min-width:20px;text-align:center;">${state.water}</span>
          <button onclick="changeWater(1)" style="background:${T.waterDim};color:${T.water};border:none;border-radius:8px;padding:6px 12px;font-size:16px;font-weight:600;">+</button>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="background:${T.water};width:${pct}%;"></div></div>
    </div>
    <div style="background:${T.accentDim};border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:${T.accent};border:1px solid ${T.accent}33;">
      🕓 <strong>15h – 16h30</strong> · Mange 1h avant · Créatine après
    </div>
    ${todayHTML}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-weight:700;font-size:15px;">Toutes les séances</span>
      <button onclick="showHistory()" class="btn" style="background:#222;color:${T.textSub};border:1px solid #2a2a2a;">Historique (${state.sessions.length})</button>
    </div>
    ${sessionsHTML}`;
}

function changeKg(d){state.kg=Math.round((state.kg+d)*10)/10;saveKg();render();}
function changeWater(d){state.water=Math.max(0,state.water+d);saveWater();render();}

// ── SESSION ───────────────────────────────────────────────
function startSession(type){
  state.session={type,exos:buildExos(type),t0:new Date().toISOString(),elapsed:0,running:true,wuDone:false,wuCals:"",note:"",restSecs:null,restDef:REST_TIMES[type]||90};
  state.view="session";render();
}
function renderSession(){
  const{type,exos,elapsed,wuDone,wuCals,note}=state.session;
  const sc=SESSIONS[type];
  const exosHTML=exos.map((ex,i)=>{
    const pr=state.bests[ex.name];
    const prW=pr?pr.weight:null;
    const nextW=prW?(prW+sc.step).toFixed(1):null;
    const setsHTML=ex.sets.map((set,si)=>`
      <div class="exo-row">
        <span style="font-size:12px;color:${T.textMuted};text-align:center;">${si+1}</span>
        <input class="inp" type="number" placeholder="—" value="${set.reps}" oninput="updSet(${i},${si},'reps',this.value)" style="text-align:center;">
        <input class="inp" type="number" placeholder="—" value="${set.weight}" oninput="updSet(${i},${si},'weight',this.value)" style="text-align:center;">
        <button onclick="remSet(${i},${si})" style="background:none;border:none;color:${T.textMuted};font-size:13px;">✕</button>
      </div>`).join("");
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <input class="inp" value="${ex.name}" oninput="updName(${i},this.value)" style="flex:1;text-align:left;font-weight:600;font-size:13px;">
        <button onclick="remEx(${i})" class="btn btn-danger" style="padding:4px 8px;">✕</button>
      </div>
      ${ex.note?`<div style="font-size:11px;color:${T.textSub};margin-bottom:6px;font-style:italic;">💡 ${ex.note}</div>`:""}
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">

function setWuDone(){state.session.wuDone=true;render();}
function cancelSession(){state.session.running=false;if(sessionInterval)clearInterval(sessionInterval);state.view=“home”;render();}
function updSet(i,si,f,v){state.session.exos[i].sets[si][f]=v;}

function finishSession(){
state.session.running=false;
if(sessionInterval)clearInterval(sessionInterval);
closeTimer();
const nb={…state.bests};
state.session.exos.forEach(ex=>ex.sets.forEach(s=>{
const w=parseFloat(s.weight);
if(!isNaN(w)&&w>0&&(!nb[ex.name]||w>=nb[ex.name].weight))nb[ex.name]={weight:w,date:state.session.t0};
}));
state.bests=nb;saveBests();
const sess={id:Date.now(),type:state.session.type,date:state.session.t0,dur:state.session.elapsed,
wuCals:state.session.wuDone?(parseInt(state.session.wuCals)||50):0,
exos:state.session.exos.filter(ex=>ex.sets.some(s=>s.reps||s.weight)),
note:state.session.note};
state.sessions.unshift(sess);saveSessions();
state.view=“home”;state.activeTab=“home”;render();
}

function copyBackup(){
const json=JSON.stringify({sessions:state.sessions,bests:state.bests,kg:state.kg,nutri:state.nutri,exportedAt:new Date().toISOString()});
navigator.clipboard.writeText(json).then(()=>{
const btn=document.getElementById(“copyBtn”);
if(btn){btn.textContent=“✅ Copié !”;btn.style.background=T.success;setTimeout(()=>{btn.textContent=“📋 Copier la sauvegarde”;btn.style.background=T.accent;},2500);}
}).catch(()=>toggleJSON());
}
function toggleJSON(){
const out=document.getElementById(“jsonOut”);
if(!out)return;
if(out.style.display===“none”){
out.value=JSON.stringify({sessions:state.sessions,bests:state.bests,kg:state.kg,nutri:state.nutri,exportedAt:new Date().toISOString()});
out.style.display=“block”;
}else{out.style.display=“none”;}
}
function importData(e){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{
try{
const d=JSON.parse(ev.target.result);
if(d.sessions){state.sessions=d.sessions;saveSessions();}
if(d.bests){state.bests=d.bests;saveBests();}
if(d.kg){state.kg=d.kg;saveKg();}
if(d.nutri){state.nutri=d.nutri;saveNutri();}
alert(“✅ Données importées !”);render();
}catch{alert(“❌ Fichier invalide.”);}
};
reader.readAsText(file);
}

<div><div style="font-weight:700;color:${s.color};font-size:15px;">${s.name}</div><div style="font-size:13px;color:${T.textSub};">${s.dose}</div></div>

}
